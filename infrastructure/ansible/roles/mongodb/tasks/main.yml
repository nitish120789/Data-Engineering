- name: Configure MongoDB YUM repository
  ansible.builtin.yum_repository:
    name: mongodb-org-{{ mongodb_major }}
    description: MongoDB Repository
    baseurl: https://repo.mongodb.org/yum/redhat/$releasever/mongodb-org/{{ mongodb_major }}/x86_64/
    gpgcheck: true
    enabled: true
    gpgkey: https://pgp.mongodb.com/server-{{ mongodb_major }}.asc

- name: Install MongoDB packages
  ansible.builtin.dnf:
    name: mongodb-org
    state: present

- name: Deploy tuned mongod.conf
  ansible.builtin.template:
    src: mongod.conf.j2
    dest: "{{ mongodb_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: restart mongodb

- name: Ensure MongoDB service is enabled and started
  ansible.builtin.service:
    name: "{{ mongodb_service_name }}"
    state: started
    enabled: true
