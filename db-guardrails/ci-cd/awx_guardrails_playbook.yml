---
- name: Setup Database Guardrails Monitoring
  hosts: database_servers
  gather_facts: yes
  vars:
    guardrails_dir: /opt/db-guardrails
    python_version: 3.10
  
  tasks:
    - name: Create guardrails directory
      file:
        path: "{{ guardrails_dir }}"
        state: directory
        mode: '0755'
    
    - name: Copy guardrails scripts
      copy:
        src: /home/ansible/db-guardrails/scripts/
        dest: "{{ guardrails_dir }}/scripts/"
        mode: '0755'
    
    - name: Install Python dependencies
      pip:
        name:
          - pyodbc
          - pyyaml
          - requests
        state: present
        executable: pip3
    
    - name: Create guardrails service user
      user:
        name: guardrails
        shell: /bin/bash
        createhome: yes
        system: yes
    
    - name: Setup daily guardrails audit cron job
      cron:
        name: "Database Guardrails Daily Audit"
        hour: "2"
        minute: "0"
        user: guardrails
        job: "cd {{ guardrails_dir }} && python3 scripts/01_detect_ai_antipatterns.sql"
    
    - name: Setup hourly mutation monitoring
      cron:
        name: "Database Mutation Monitor"
        minute: "*/60"
        user: guardrails
        job: "cd {{ guardrails_dir }} && python3 scripts/03_mutation_safeguard_monitor.sql"
    
    - name: Create guardrails log directory
      file:
        path: /var/log/db-guardrails
        state: directory
        owner: guardrails
        group: guardrails
        mode: '0755'
    
    - name: Configure logrotate for guardrails
      template:
        src: logrotate_guardrails.j2
        dest: /etc/logrotate.d/db-guardrails
        owner: root
        group: root
        mode: '0644'

- name: Deploy Guardrails Alerts
  hosts: monitoring_servers
  tasks:
    - name: Create Prometheus alerting rules
      template:
        src: prometheus_guardrails_alerts.j2
        dest: /etc/prometheus/rules/db-guardrails-alerts.yml
      notify: reload prometheus
    
    - name: Configure AlertManager channels
      template:
        src: alertmanager_guardrails_config.j2
        dest: /etc/alertmanager/config.yml
      notify: reload alertmanager
