# ora2pg configuration template
# Author: Nitish Anand Srivastava

ORACLE_DSN     dbi:Oracle:host=oracle-prod.internal.local;sid=ORCLPRD;port=1521
ORACLE_USER    migration_user
ORACLE_PWD     <secure-password>
SCHEMA         APP_SCHEMA
TYPE           TABLE
OUTPUT         logs/schema_tables.sql
PG_VERSION     15
EXPORT_SCHEMA  1
DATA_LIMIT     0
JOBS           4
ESTIMATE_COST  1
FILE_PER_TABLE 0
DISABLE_TRIGGERS 1

# Recommended separate passes:
# TYPE VIEW
# TYPE SEQUENCE
# TYPE FUNCTION
# TYPE PACKAGE
